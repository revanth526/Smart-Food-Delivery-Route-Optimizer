# Server Configuration
server.port=8080

# ==========================================
# 1. DEFAULT DATABASE: H2 (In-Memory)
# ==========================================
spring.datasource.url=jdbc:h2:mem:smartfooddb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console Configuration (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ==========================================
# 2. ALTERNATIVE: PostgreSQL Configuration
# (Uncomment to use your local Postgres service)
# ==========================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/smartfooddb
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=YOUR_PG_PASSWORD
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# 3. ALTERNATIVE: MySQL Configuration
# ==========================================
# spring.datasource.url=jdbc:mysql://localhost:3306/smartfooddb?useSSL=false&serverTimezone=UTC
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=YOUR_MYSQL_PASSWORD
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Common JPA Properties
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Allow H2 Console inside frames
spring.headers.frame-options=sameorigin
